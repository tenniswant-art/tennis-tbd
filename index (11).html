<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TBD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f2d5e">
<title>테니스병동 TBD</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--g:#1a56b0;--gl:#dbeafe;--gd:#1e3a5f;--sf:#fff;--bd:#e2e8f0;--tx:#0f172a;--mt:#64748b;--rd:#ef4444;--rl:#fef2f2;--am:#f59e0b;--aml:#fffbeb;--amd:#78350f}
@media(prefers-color-scheme:dark){:root{--sf:#0f1e33;--bd:#1e3a5f;--tx:#e8f0fe;--mt:#7a9cc4;--gl:#1e3a5f;--rl:#3d1515;--aml:#2d1f00;--amd:#fcd34d}}
html,body{height:100%;overflow:hidden;touch-action:pan-y}
body{font-family:-apple-system,sans-serif;color:var(--tx);background:#1a2744;display:flex;justify-content:center}
.app{max-width:420px;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--sf);position:relative;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.hdr{background:#0f2d5e;padding:16px 14px 12px;padding-top:calc(16px + env(safe-area-inset-top))}
.htitle{color:#fff;font-size:19px;font-weight:600;display:flex;align-items:center;gap:8px}
.htag{font-size:12px;opacity:.5}
.gline{height:2px;background:#e8b923;margin:10px 0 0}
.ustrip{margin-top:12px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ustrip::-webkit-scrollbar{display:none}
.ucard{background:rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;min-width:114px;flex-shrink:0;cursor:pointer;border:1px solid rgba(255,255,255,.12)}
.ucard.tod{background:rgba(232,185,35,.2);border-color:rgba(232,185,35,.5)}
.udate{font-size:10px;color:rgba(255,255,255,.6);font-weight:500}
.ucourt{font-size:12px;color:#fff;font-weight:600;margin-top:2px}
.utime{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.upills{display:flex;gap:3px;margin-top:5px}
.upill{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff}
.me-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px 3px 5px;border:1px solid rgba(255,255,255,.2)}
.me-av{width:22px;height:22px;border-radius:6px;background:#e8b923;color:#0f2d5e;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.me-nm{color:#fff;font-size:12px;font-weight:600}
.nav{background:var(--sf);margin:0 10px;border-radius:12px;border:.5px solid var(--bd);display:flex;position:sticky;top:8px;z-index:20;margin-top:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.nb{flex:1;padding:10px 2px 8px;color:var(--mt);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb i{font-size:20px}.nb.on{color:var(--g)}
.ndot{width:4px;height:4px;border-radius:50%}.nb.on .ndot{background:var(--g)}
.pg{display:none;padding:14px}.pg.on{display:block}
.chatpg{display:none;flex-direction:column;height:calc(100vh - 185px);min-height:400px}.chatpg.on{display:flex}
h2{font-size:16px;font-weight:600;margin-bottom:12px}
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}
.btn{border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;border:none}
.btng{background:var(--g);color:#fff;width:100%;justify-content:center}
.btno{background:none;border:.5px solid var(--bd);color:var(--tx)}
.sm{padding:5px 10px;font-size:11px;border-radius:7px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);font-weight:500}
.sm.yes{background:var(--g);color:#fff;border-color:var(--g)}.sm.no{background:var(--rd);color:#fff;border-color:var(--rd)}.sm.paid{background:var(--g);color:#fff;border-color:var(--g)}
.ibtn{background:none;border:none;cursor:pointer;color:var(--mt);padding:4px;font-size:16px;line-height:1;display:inline-flex;align-items:center;border-radius:5px}
.av{width:32px;height:32px;border-radius:7px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gd);flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.pg2{background:var(--gl);color:var(--gd)}.pr2{background:var(--rl);color:var(--rd)}.pgr{background:var(--bd);color:var(--mt)}
.vstatus{font-size:11px;padding:4px 10px;border-radius:7px;font-weight:500;margin-left:auto}
.vstatus.vy{background:var(--gl);color:var(--gd)}.vstatus.vn{background:var(--rl);color:var(--rd)}.vstatus.v0{background:var(--bd);color:var(--mt)}
.vrow.mine{background:rgba(26,86,176,.04)}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calm{font-size:15px;font-weight:600}
.calnav{display:flex;gap:3px}
.calnav button{background:none;border:.5px solid var(--bd);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--tx);font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.dow{font-size:10px;color:var(--mt);text-align:center;padding:2px 0;font-weight:500}
.day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;gap:1px;min-width:0}
.day.empty{cursor:default}.day.sat .dn{color:var(--g)}.day.sun .dn{color:#ef4444}
.day.tod .dn{background:var(--g);color:#fff;width:21px;height:21px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700}
.day.sel{background:var(--gl)}.day.has .dn{font-weight:700}
.dn{font-size:11px;line-height:1;color:var(--tx)}
.edots{display:flex;gap:3px;justify-content:center;margin-top:1px}
.edot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}.edot.p{background:var(--am)}
.spanel,.vpanel{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.sphdr,.vphdr{padding:10px 12px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:6px}
.vptit{font-size:13px;font-weight:600;flex:1}
.tabbar{display:flex;border-bottom:.5px solid var(--bd)}
.tabbtn{flex:1;padding:8px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--mt);border-bottom:2px solid transparent}
.tabbtn.on{color:var(--g);border-bottom-color:var(--g);font-weight:500}
.sitem{padding:10px 12px;border-bottom:.5px solid var(--bd);cursor:pointer}.sitem:last-child{border-bottom:none}
.vrow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:.5px solid var(--bd)}.vrow:last-child{border-bottom:none}
.vbtns{display:flex;gap:4px;margin-left:auto}
.frow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:.5px solid var(--bd)}.frow:last-child{border-bottom:none}
.pbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:100%;background:var(--g);border-radius:2px}
.mttbar{display:flex;gap:6px;margin-bottom:8px}
.mtt{padding:6px 14px;font-size:12px;border-radius:7px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);font-weight:500}
.mtt.as{background:#f59e0b;color:#fff}.mtt.ad{background:var(--g);color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.pcard{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:9px;border:1.5px solid var(--bd);cursor:pointer}
.pcard .pav{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gd);background:var(--gl)}
.pcard .pnm{font-size:10px;color:var(--mt);text-align:center;line-height:1.3}
.pcard.win{border-color:var(--g);background:#f0fdf4}.pcard.win .pav{background:var(--g);color:#fff}.pcard.win .pnm{color:var(--g);font-weight:700}
.pcard.lose{border-color:var(--rd);background:var(--rl)}.pcard.lose .pav{background:var(--rd);color:#fff}.pcard.lose .pnm{color:var(--rd);font-weight:700}
.mleg{font-size:11px;color:var(--mt);margin-bottom:8px;display:flex;gap:8px}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:2px}
.mitem{border:.5px solid var(--bd);border-radius:8px;padding:9px 12px;margin-bottom:6px}
.pnrow{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:.5px solid var(--bd)}.pnrow:last-child{border-bottom:none}
.pninfo{flex:1;min-width:0}
.pnname{font-size:13px;font-weight:500;margin-bottom:5px}
.pnbtns{display:flex;gap:4px}
.pb{padding:4px 8px;font-size:11px;border-radius:6px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);white-space:nowrap}
.pb.kok{background:#f0fdf4;color:#16a34a;border-color:#86efac;font-weight:700}
.pb.klate{background:var(--aml);color:#b45309;border-color:#fcd34d;font-weight:700}
.pb.kday{background:#fff7ed;color:#c2410c;border-color:#fb923c;font-weight:700}
.pb.kprev{background:var(--rl);color:var(--rd);border-color:#fca5a5;font-weight:700}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.scard{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:10px}
.slbl{font-size:10px;color:var(--mt);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.sval{font-size:20px;font-weight:600}
.mrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:.5px solid var(--bd)}.mrow:last-child{border-bottom:none}
.mname{flex:1;font-size:13px;font-weight:500}
.rbar{height:4px;background:var(--bd);border-radius:2px;margin-top:3px;overflow:hidden}
.rfill{height:100%;border-radius:2px}
.cbar{padding:10px 12px;border-bottom:.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cme{display:flex;align-items:center;gap:6px;background:var(--gl);border-radius:8px;padding:5px 10px}
.cme-av{width:22px;height:22px;border-radius:5px;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cme-nm{font-size:13px;font-weight:600;color:var(--gd)}
.cmsgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:0}
.mrow2{display:flex;gap:6px;align-items:flex-end}.mrow2.me{flex-direction:row-reverse}
.mav2{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.mbody{max-width:75%}
.sndr{font-size:10px;color:var(--mt);margin-bottom:2px}
.bubble{padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4;word-break:break-word}
.bo{background:var(--bd);color:var(--tx)}.bm{background:var(--g);color:#fff}
.mtime{font-size:10px;color:var(--mt);margin-top:2px}.mrow2.me .mtime{text-align:right}
.datdiv{text-align:center;margin:3px 0;font-size:10px;color:var(--mt)}
.cinpbar{padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));border-top:.5px solid var(--bd);background:var(--sf);display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.cinp{flex:1;padding:8px 10px;border:.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--sf);color:var(--tx);resize:none;min-height:36px;max-height:80px;line-height:1.4;font-family:inherit;outline:none}
.cinp:focus{border-color:var(--g)}
.sbtn{width:36px;height:36px;border-radius:7px;background:var(--g);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cempty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:13px;text-align:center}
.empty{text-align:center;padding:28px;color:var(--mt);font-size:13px}
.hint{font-size:11px;color:var(--rd);min-height:16px;margin-top:4px}
.fab{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));right:calc(14px + max(0px,(100vw - 420px)/2));width:48px;height:48px;border-radius:10px;background:var(--g);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 12px rgba(26,86,176,.4)}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:flex-end;justify-content:center}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:14px 14px 0 0;padding:18px 14px calc(30px + env(safe-area-inset-bottom));width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.mac{display:flex;gap:8px;margin-top:12px}.mac .btn{flex:1}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:var(--mt);display:block;margin-bottom:3px;font-weight:500}
.fg input{width:100%;padding:8px 10px;border:.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--sf);color:var(--tx)}
.court-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.court-btn{padding:6px 10px;font-size:11px;border-radius:7px;border:.5px solid var(--g);background:var(--gl);color:var(--gd);cursor:pointer;font-weight:500}
.assign-game{background:var(--sf);border-radius:8px;padding:10px;margin-bottom:6px;border:.5px solid var(--bd)}
.assign-team{display:flex;align-items:center;gap:6px;padding:4px 0;flex-wrap:wrap}
.rank-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:.5px solid var(--bd)}.rank-row:last-child{border-bottom:none}
.elo-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--gl);color:var(--g)}
.streak-badge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;white-space:nowrap}
.streak-s{background:#fef3c7;color:#92400e}.streak-d{background:var(--gl);color:var(--gd)}
.mvp-card{background:linear-gradient(135deg,#0f2d5e,#1a56b0);border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
.setup{position:fixed;inset:0;background:#0f2d5e;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px}
.setup.hide{display:none}
.setup-card{background:rgba(255,255,255,.1);border-radius:14px;padding:20px;width:100%;max-width:340px;border:1px solid rgba(255,255,255,.15)}
.setup-card label{color:rgba(255,255,255,.7);font-size:12px;display:block;margin-bottom:6px;font-weight:500}
.setup-inp{width:100%;padding:11px 12px;border-radius:9px;font-size:15px;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.2)}
.setup-inp::placeholder{color:rgba(255,255,255,.4)}
.setup-inp:focus{outline:none;border-color:#e8b923}
.setup-hint{font-size:11px;min-height:16px;margin-top:6px;color:#e8b923}
.setup-btn{width:100%;padding:13px;border-radius:10px;background:#e8b923;color:#0f2d5e;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:14px}
.loading{position:fixed;inset:0;background:#0f2d5e;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#e8b923;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading" id="loading"><div style="font-size:40px">🎾</div><div style="color:#fff;font-size:20px;font-weight:700">테니스병동</div><div class="spinner"></div></div>
<div class="setup hide" id="setup">
  <div style="font-size:40px">🎾</div>
  <div style="color:#fff;font-size:22px;font-weight:700">테니스병동</div>
  <div style="color:rgba(255,255,255,.6);font-size:14px;text-align:center;line-height:1.5">이름을 입력하면 자동으로<br>멤버에 등록됩니다</div>
  <div class="setup-card">
    <label>내 이름</label>
    <input class="setup-inp" id="si" placeholder="이름 입력..." autocomplete="off" list="slist">
    <datalist id="slist"></datalist>
    <div class="setup-hint" id="sh"></div>
    <button class="setup-btn" id="sb">시작하기 →</button>
  </div>
</div>
<div class="app">
  <div class="hdr">
    <div class="htitle"><i class="ti ti-sport-billard"></i> 테니스병동 <span class="htag">[TBD]</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <div style="color:rgba(255,255,255,.5);font-size:12px" id="tlbl"></div>
      <div class="me-badge"><div class="me-av" id="mav"></div><span class="me-nm" id="mnm"></span></div>
    </div>
    <div class="gline"></div>
    <div class="ustrip" id="ustrip"></div>
  </div>
  <nav class="nav" id="mainnav"></nav>
  <div class="pg on" id="page-cal"><div id="calwrap"></div></div>
  <div class="pg" id="page-match"><h2>🎾 경기 전적</h2><div id="mssel" style="margin-bottom:10px"></div><div id="mcontent"></div></div>
  <div class="pg" id="page-penalty"><h2>⚠️ 지각·취소</h2><div id="pnsel" style="margin-bottom:10px"></div><div id="pncontent"></div></div>
  <div class="pg" id="page-stats"><h2>📊 랭킹 & 통계</h2><div id="statslist"></div></div>
  <div class="pg" id="page-fee"><h2>💰 회비</h2><div id="fcontent"></div></div>
  <div class="chatpg" id="page-chat">
    <div class="cbar"><div class="cme"><div class="cme-av" id="cav"></div><span class="cme-nm" id="cnm"></span></div><span style="font-size:11px;color:var(--mt);margin-left:auto">내 이름으로 전송</span></div>
    <div class="cmsgs" id="cmsgs"><div class="cempty">메시지를 보내보세요 💬</div></div>
    <div class="cinpbar"><textarea class="cinp" id="cinp" placeholder="메시지 입력..." rows="1"></textarea><button class="sbtn" id="csend"><i class="ti ti-send"></i></button></div>
  </div>
  <div class="pg" id="page-members"><h2>👥 멤버</h2><div class="hint" id="dhint"></div><div id="mlist" style="margin-top:6px"></div></div>
</div>
<button class="fab" id="fab"><i class="ti ti-plus"></i></button>
<div class="ovl" id="mo-sess"><div class="modal"><h3>일정 추가</h3>
  <div class="fg"><label>날짜</label><input type="date" id="idate"></div>
  <div class="fg"><label>시간</label><input type="time" id="itime" value="10:00"></div>
  <div class="fg"><label>코트</label><div class="court-btns" id="court-btns"></div><input type="text" id="icourt" placeholder="직접 입력 또는 위에서 선택"></div>
  <div style="font-size:11px;color:var(--rd);min-height:16px;margin:-4px 0 8px" id="cerr"></div>
  <div class="mac"><button class="btn btno" id="msc">취소</button><button class="btn btng" id="mss">저장</button></div>
</div></div>
<div class="ovl" id="mo-courts"><div class="modal"><h3>🏟️ 코트 관리</h3>
  <div id="courts-list" style="margin-bottom:12px"></div>
  <div style="display:flex;gap:6px"><input type="text" id="new-court" placeholder="새 코트 이름" style="flex:1;padding:8px 10px;border:.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--sf);color:var(--tx)"><button class="btn btng" style="width:auto;padding:8px 12px;font-size:12px;border-radius:7px" id="add-court-btn">추가</button></div>

// ━━━ 📊 통계 계산 ━━━
function calcELOs(){
  const elo={singles:{},doubles:{}};
  (S.members||[]).forEach(m=>{elo.singles[m.id]=1000;elo.doubles[m.id]=1000;});
  [...(S.matches||[])].sort((a,b)=>(a.time||0)-(b.time||0)).forEach(m=>{
    const K=32,t=m.type==='singles'?'singles':'doubles';
    const avgW=m.winners.reduce((s,id)=>s+(elo[t][id]||1000),0)/Math.max(m.winners.length,1);
    const avgL=m.losers.reduce((s,id)=>s+(elo[t][id]||1000),0)/Math.max(m.losers.length,1);
    const delta=K*(1-1/(1+Math.pow(10,(avgL-avgW)/400)));
    m.winners.forEach(id=>{if(elo[t][id]!==undefined)elo[t][id]+=delta;});
    m.losers.forEach(id=>{if(elo[t][id]!==undefined)elo[t][id]-=delta;});
  });
  return elo;
}
function getStreak(mid,type){
  const ms=[...(S.matches||[])].filter(m=>m.type===type&&(m.winners.includes(mid)||m.losers.includes(mid))).sort((a,b)=>(b.time||0)-(a.time||0));
  let s=0;for(const m of ms){if(m.winners.includes(mid))s++;else break;}return s;
}
function getAtt(mid){const t=(S.sessions||[]).length;if(!t)return 0;return Math.round((S.sessions||[]).filter(s=>(S.votes[s.id]||{})[mid]==='yes').length/t*100);}
function getMonthlyMVP(){
  const now=new Date(),month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const wins={};
  (S.matches||[]).forEach(m=>{if(!m.time)return;const d=new Date(m.time);if(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`!==month)return;m.winners.forEach(id=>{wins[id]=(wins[id]||0)+1;});});
  const top=Object.entries(wins).sort((a,b)=>b[1]-a[1])[0];
  return top&&top[1]>0?{id:top[0],wins:top[1]}:null;
}
function getPairCnt(id1,id2){return(S.matches||[]).filter(m=>{const a=[...m.winners,...m.losers];return a.includes(id1)&&a.includes(id2);}).length;}
function pairScore(team){let s=0;for(let i=0;i<team.length;i++)for(let j=i+1;j<team.length;j++)s+=getPairCnt(team[i].id,team[j].id);return s;}

// ━━━ 🎯 자동배정 ━━━
function autoAssign(members){
  const n=members.length;
  if(n<2)return null;
  if(n===2)return{type:'singles',games:[{t1:[members[0]],t2:[members[1]],gtype:'singles'}]};
  if(n===3)return{type:'rotation',games:[{t1:[members[0]],t2:[members[1]],gtype:'singles'},{t1:[members[1]],t2:[members[2]],gtype:'singles'},{t1:[members[0]],t2:[members[2]],gtype:'singles'}],note:'3명 로테이션'};
  if(n===4){
    const combos=[];
    for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const t1=[members[i],members[j]],t2=members.filter(m=>!t1.includes(m));combos.push({t1,t2,score:pairScore(t1)+pairScore(t2)});}
    combos.sort((a,b)=>a.score-b.score);
    return{type:'choice',doubles:{...combos[0],gtype:'doubles'},singles:[{t1:[members[0]],t2:[members[1]],gtype:'singles'},{t1:[members[2]],t2:[members[3]],gtype:'singles'}]};
  }
  const games=[],pool=[...members],waiting=[];
  while(pool.length>=4){
    const avail=pool.splice(0,4),combos=[];
    for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const t1=[avail[i],avail[j]],t2=avail.filter(m=>!t1.includes(m));combos.push({t1,t2,score:pairScore(t1)+pairScore(t2)});}
    combos.sort((a,b)=>a.score-b.score);games.push({...combos[0],gtype:'doubles'});
  }
  pool.forEach(m=>waiting.push(m));
  return{type:'rotation',games,waiting,note:waiting.length?`${waiting.map(m=>m.name).join(', ')} 대기 → 로테이션`:''};
}

// ━━━ 💰 회비 ━━━
function getMemberUnpaid(mid){let total=0,cnt=0;(S.sessions||[]).forEach(s=>{const v=S.votes[s.id]||{};if(v[mid]!=='yes')return;const fee=S.fees[s.id]||{total:0,paid:{}};if(fee.paid[mid])return;const att=(S.members||[]).filter(m=>v[m.id]==='yes').length;if(att>0&&fee.total>0){total+=Math.round(fee.total/att);cnt++;}});return{total,cnt};}
function markAllPaid(mid){(S.sessions||[]).forEach(s=>{const v=S.votes[s.id]||{};if(v[mid]!=='yes')return;if(!S.fees[s.id])S.fees[s.id]={total:0,paid:{}};S.fees[s.id].paid[mid]=true;});saveS();rFee();}

function urlB64(b){const p='='.repeat((4-b.length%4)%4),r=(b+p).replace(/-/g,'+').replace(/_/g,'/');return Uint8Array.from([...atob(r)].map(c=>c.charCodeAt(0)));}

async function initPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
  try{
    const reg=await navigator.serviceWorker.register('/sw.js');
    const perm=await Notification.requestPermission();
    if(perm!=='granted')return;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64(VAPID_PUB)});
    // Firebase에 구독 정보 저장
    storage.set('subscriptions/'+myId,JSON.stringify(sub),true);
  }catch(e){console.log('Push init:',e);}
}

async function sendPush(title,body,excludeId=null){
  try{
    const r=await storage.get('subscriptions',true);
    if(!r?.value)return;
    const subsObj=JSON.parse(r.value);
    const subscriptions=Object.entries(subsObj).filter(([id,s])=>s&&id!==excludeId).map(([,s])=>s);
    if(!subscriptions.length)return;
    fetch('/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,subscriptions})});
  }catch(e){}
}

  const nav=document.createElement('div');nav.className='calnav';
  [['<i class="ti ti-chevron-left"></i>',()=>{calM--;if(calM<0){calM=11;calY--;}selD=null;selSid=null;rCal();}],['<i class="ti ti-chevron-right"></i>',()=>{calM++;if(calM>11){calM=0;calY++;}selD=null;selSid=null;rCal();}]].forEach(([h,fn])=>{const b=document.createElement('button');b.innerHTML=h;b.addEventListener('click',fn);nav.appendChild(b);});
  hdr.appendChild(mn);hdr.appendChild(nav);w.appendChild(hdr);
  const grid=document.createElement('div');grid.className='calgrid';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{const dw=document.createElement('div');dw.className='dow';dw.style.color=i===0?'#ef4444':i===6?'var(--g)':'';dw.textContent=d;grid.appendChild(dw);});

  for(let d=1;d<=dim;d++){

    const dn=document.createElement('div');dn.className='dn';dn.textContent=d;cell.appendChild(dn);
    if(sess.length){const dots=document.createElement('div');dots.className='edots';sess.forEach(()=>{const dot=document.createElement('div');dot.className='edot'+(hp?' p':'');dots.appendChild(dot);});cell.appendChild(dots);}

function tVote(sid,mid,val,mName,court){

function rStatsList(el,elos){
  el.innerHTML='';
  const members=S.members||[];
  let list=[];
  if(stType==='att')list=members.map(m=>({m,val:getAtt(m.id)})).sort((a,b)=>b.val-a.val);
  else list=members.map(m=>({m,val:Math.round(elos[stType][m.id]||1000)})).sort((a,b)=>b.val-a.val);
  if(!list.length){el.innerHTML='<div class="empty">멤버가 없습니다</div>';return;}

    const ss=getStreak(m.id,'singles'),ds=getStreak(m.id,'doubles');
    const sw=(S.matches||[]).filter(g=>g.type==='singles'&&g.winners.includes(m.id)).length,sl=(S.matches||[]).filter(g=>g.type==='singles'&&g.losers.includes(m.id)).length;

    const num=document.createElement('div');num.style.cssText='font-size:16px;min-width:24px;text-align:center';num.textContent=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    const av=document.createElement('div');av.className='av';av.style.cssText=`background:${col(m.name)};color:#fff`;av.textContent=ini(m.name);
    const info=document.createElement('div');info.style.flex='1';
    const streaks=`${ss>=2?`<span class="streak-badge streak-s">🔥단식 ${ss}연승</span> `:''}${ds>=2?`<span class="streak-badge streak-d">🎾복식 ${ds}연승</span>`:''}`;
    info.innerHTML=`<div style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap">${m.name} ${streaks}</div><div style="font-size:11px;color:var(--mt);margin-top:2px">${stType==='att'?`참석률 ${val}%`:stType==='singles'?`${sw}승 ${sl}패`:`${dw}승 ${dl}패`}</div>`;
    const badge=document.createElement('div');badge.className='elo-badge';badge.textContent=stType==='att'?`${val}%`:val;
    row.appendChild(num);row.appendChild(av);row.appendChild(info);row.appendChild(badge);el.appendChild(row);
  });
}

function rFee(){
  const el=G('fcontent');el.innerHTML='';
  if(!(S.members||[]).length){el.innerHTML='<div class="empty">멤버가 없습니다</div>';return;}
  const totalUnpaid=(S.members||[]).reduce((sum,m)=>sum+getMemberUnpaid(m.id).total,0);
  const summary=document.createElement('div');summary.className='card';summary.style.borderLeft='3px solid var(--am)';
  summary.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:var(--mt);margin-bottom:2px">전체 미납 합계</div><div style="font-size:22px;font-weight:700;color:var(--rd)">${totalUnpaid>0?won(totalUnpaid):'없음 ✓'}</div></div><div style="font-size:28px">${totalUnpaid>0?'💸':'✅'}</div></div>`;
  el.appendChild(summary);
  if(isAdmin()){const guide=document.createElement('div');guide.style.cssText='font-size:11px;color:var(--mt);margin-bottom:8px;padding:0 2px';guide.textContent='💡 코트비는 일정 탭 → 일정 선택 → 회비에서 입력';el.appendChild(guide);}
  const card=document.createElement('div');card.className='card';
  (S.members||[]).forEach(m=>{const{total,cnt}=getMemberUnpaid(m.id);const isPaid=total===0;const row=document.createElement('div');row.className='frow';const av=document.createElement('div');av.className='av';av.style.cssText=`background:${isPaid?'#16a34a':col(m.name)};color:#fff`;av.textContent=ini(m.name);const info=document.createElement('div');info.style.flex='1';const isMe=m.id===myId;info.innerHTML=`<div style="font-size:13px;font-weight:500">${m.name}${isMe?' <span style="font-size:10px;color:var(--g);font-weight:600">• 나</span>':''}</div><div style="font-size:12px;margin-top:2px;color:${isPaid?'#16a34a':col(m.name)};font-weight:600">${isPaid?'납부완료 ✓':`미납 ${won(total)}${cnt>0?` (${cnt}경기)`:''}`}</div>`;row.appendChild(av);row.appendChild(info);if(isAdmin()&&!isPaid){const btn=document.createElement('button');btn.className='btn btng';btn.style.cssText='width:auto;padding:6px 12px;font-size:11px;border-radius:7px;white-space:nowrap';btn.textContent='납부완료';const mid=m.id;btn.addEventListener('click',()=>markAllPaid(mid));row.appendChild(btn);}card.appendChild(row);});
  el.appendChild(card);
}

function rChat(){
  const el=G('cmsgs');
  if(!CHAT.messages.length){el.innerHTML='<div class="cempty">메시지를 보내보세요 💬</div>';return;}
  el.innerHTML='';let ld='';
  CHAT.messages.forEach(msg=>{const ds=fd(msg.ts);if(ds!==ld){const dd=document.createElement('div');dd.className='datdiv';dd.textContent=ds;el.appendChild(dd);ld=ds;}const isMe=msg.name===myName,c=col(msg.name);const row=document.createElement('div');row.className='mrow2'+(isMe?' me':'');const av=document.createElement('div');av.className='mav2';av.style.cssText=`background:${c}18;color:${c}`;av.textContent=ini(msg.name);const body=document.createElement('div');body.className='mbody';if(!isMe){const sn=document.createElement('div');sn.className='sndr';sn.textContent=msg.name;body.appendChild(sn);}const bub=document.createElement('div');bub.className='bubble '+(isMe?'bm':'bo');bub.innerHTML=esc(msg.text);const mt=document.createElement('div');mt.className='mtime';mt.textContent=ft(msg.ts);body.appendChild(bub);body.appendChild(mt);row.appendChild(av);row.appendChild(body);el.appendChild(row);});
}
function scr(){const el=G('cmsgs');if(el)el.scrollTop=el.scrollHeight;}
function sendMsg(){
  if(!myName)return;const inp=G('cinp'),text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='';
  CHAT.messages.push({id:'c'+Date.now(),name:myName,text,ts:Date.now()});
  rChat();scr();saveC();
  // 🔔 채팅 알림 → 나 제외
  const preview=text.length>30?text.slice(0,30)+'…':text;
  sendPush(`💬 ${myName}`,preview,myId);
}

function rMembers(){
  const el=G('mlist'),hint=G('dhint');if(hint)hint.textContent='';el.innerHTML='';
  if(!(S.members||[]).length){el.innerHTML='<div class="empty">아직 없어요</div>';return;}
  const card=document.createElement('div');card.className='card';
  if(isAdmin()){card.addEventListener('click',function(e){const btn=e.target.closest('[data-del]');if(!btn)return;const id=btn.getAttribute('data-del');if(!id||id===S.adminId)return;if(pDel===id){clearTimeout(pDelT);pDel=null;S.members=S.members.filter(m=>m.id!==id);saveS();if(hint)hint.textContent='';rMembers();}else{if(pDel){clearTimeout(pDelT);pDel=null;}pDel=id;btn.style.color='var(--rd)';btn.style.background='var(--rl)';btn.style.borderRadius='6px';if(hint)hint.textContent='한 번 더 탭하면 삭제';pDelT=setTimeout(()=>{pDel=null;if(hint)hint.textContent='';rMembers();},2500);}});}
  const elos=calcELOs();
  card.innerHTML=(S.members||[]).map(m=>{
    const ss=getStreak(m.id,'singles'),ds=getStreak(m.id,'doubles'),att=getAtt(m.id);
    const isMe=m.id===myId,admin=m.id===S.adminId;
    const sElo=Math.round(elos.singles[m.id]||1000),dElo=Math.round(elos.doubles[m.id]||1000);
    const streaks=`${ss>=2?`<span class="streak-badge streak-s">🔥${ss}연</span> `:''}${ds>=2?`<span class="streak-badge streak-d">🎾${ds}연</span>`:''}`;
    return`<div class="mrow"${isMe?' style="background:rgba(26,86,176,.04);border-radius:8px;"':''}>
      <div class="av" style="background:${col(m.name)};color:#fff">${ini(m.name)}</div>
      <div style="flex:1;min-width:0"><div class="mname">${m.name}${admin?' 👑':''}${isMe?' <span style="font-size:10px;color:var(--g);font-weight:600">• 나</span>':''} ${streaks}</div>
      <div style="font-size:10px;color:var(--mt);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap"><span>단식 <b style="color:var(--g)">${sElo}</b></span><span>복식 <b style="color:#7c3aed">${dElo}</b></span><span>참석 <b>${att}%</b></span></div></div>
      ${isAdmin()&&!admin?`<button class="ibtn" data-del="${m.id}"><i class="ti ti-trash"></i></button>`:''}
    </div>`;
  }).join('');
  el.appendChild(card);
}

function render(){if(page==='cal')rCal();else if(page==='match')rMatch();else if(page==='penalty')rPenalty();else if(page==='stats')rStats();else if(page==='fee')rFee();else if(page==='members')rMembers();}
load();
</script>
</body>
</html>
