<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TBD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f2d5e">
<title>테니스병동 TBD</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--g:#1a56b0;--gl:#dbeafe;--gd:#1e3a5f;--sf:#fff;--bd:#e2e8f0;--tx:#0f172a;--mt:#64748b;--rd:#ef4444;--rl:#fef2f2;--am:#f59e0b;--aml:#fffbeb;--amd:#78350f}
@media(prefers-color-scheme:dark){:root{--sf:#0f1e33;--bd:#1e3a5f;--tx:#e8f0fe;--mt:#7a9cc4;--gl:#1e3a5f;--gd:#93c5fd;--rl:#3d1515;--aml:#2d1f00;--amd:#fcd34d}}
html,body{height:100%;overflow:hidden;touch-action:pan-y}
body{font-family:-apple-system,sans-serif;color:var(--tx);background:var(--sf)}
.app{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:var(--sf);position:relative;padding-bottom:calc(140px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.app.chat-mode{display:flex;flex-direction:column;padding-bottom:0;overflow:hidden}
.hdr{background:#0f2d5e;padding:16px 14px 12px;padding-top:calc(16px + env(safe-area-inset-top))}
.htitle{color:#fff;font-size:19px;font-weight:600;display:flex;align-items:center;gap:8px}
.htag{font-size:12px;opacity:.5}
.gline{height:2px;background:#e8b923;margin:10px 0 0}
.ulabel{color:rgba(255,255,255,.5);font-size:11px;font-weight:600;margin-top:10px;margin-bottom:-2px}
.ustrip{margin-top:8px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;touch-action:pan-x}
.ustrip::-webkit-scrollbar{display:none}
.ucard{background:rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;min-width:114px;flex-shrink:0;cursor:pointer;border:1px solid rgba(255,255,255,.12);scroll-snap-align:start}
.ucard.tod{background:rgba(232,185,35,.2);border-color:rgba(232,185,35,.5)}
.udate{font-size:10px;color:rgba(255,255,255,.6);font-weight:500}
.ucourt{font-size:12px;color:#fff;font-weight:600;margin-top:2px}
.utime{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.upills{display:flex;gap:3px;margin-top:5px}
.upill{font-size:9px;padding:1px 5px;border-radius:4px;color:#fff}
.me-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px 3px 5px;border:1px solid rgba(255,255,255,.2)}
.me-av{width:22px;height:22px;border-radius:6px;background:#e8b923;color:#0f2d5e;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.me-nm{color:#fff;font-size:12px;font-weight:600}
.nav{background:var(--sf);margin:0 8px;border-radius:12px;border:.5px solid var(--bd);display:flex;position:sticky;top:6px;z-index:20;margin-top:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.nb{flex:1;padding:10px 2px 8px;color:var(--mt);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.nb i{font-size:20px}.nb.on{color:var(--g)}
.ndot{width:4px;height:4px;border-radius:50%}.nb.on .ndot{background:var(--g)}
.ndot.noti{width:7px;height:7px;background:#ef4444!important;position:absolute;top:6px;margin-left:14px;box-shadow:0 0 0 2px var(--sf)}
.pg{display:none;padding:14px}.pg.on{display:block}
.chatpg{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}.chatpg.on{display:flex}
h2{font-size:16px;font-weight:600;margin-bottom:12px}
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}
.btn{border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;border:none}
.btng{background:var(--g);color:#fff;width:100%;justify-content:center}
.btno{background:none;border:.5px solid var(--bd);color:var(--tx)}
.sm{padding:5px 10px;font-size:11px;border-radius:7px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);font-weight:500}
.sm.yes{background:var(--g);color:#fff;border-color:var(--g)}.sm.no{background:var(--rd);color:#fff;border-color:var(--rd)}.sm.paid{background:var(--g);color:#fff;border-color:var(--g)}
.ibtn{background:none;border:none;cursor:pointer;color:var(--mt);padding:4px;font-size:16px;line-height:1;display:inline-flex;align-items:center;border-radius:5px}
.av{width:32px;height:32px;border-radius:7px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gd);flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.pg2{background:var(--gl);color:var(--gd)}.pr2{background:var(--rl);color:var(--rd)}.pgr{background:var(--bd);color:var(--mt)}
.vstatus{font-size:11px;padding:4px 10px;border-radius:7px;font-weight:500;margin-left:auto}
.vstatus.vy{background:var(--gl);color:var(--gd)}.vstatus.vn{background:var(--rl);color:var(--rd)}.vstatus.v0{background:var(--bd);color:var(--mt)}
.vrow.mine{background:rgba(26,86,176,.04)}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calm{font-size:15px;font-weight:600}
.calnav{display:flex;gap:3px}
.calnav button{background:none;border:.5px solid var(--bd);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--tx);font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;will-change:transform;touch-action:pan-y}
.dow{font-size:10px;color:var(--mt);text-align:center;padding:2px 0;font-weight:500}
.day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;gap:1px;min-width:0}
.day.empty{cursor:default}.day.sat .dn{color:var(--g)}.day.sun .dn{color:#ef4444}
.day.tod{background:rgba(34,197,94,.1);border-radius:8px}
.day.tod .dn{background:var(--g);color:#fff;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 2px 8px rgba(34,197,94,.5);font-size:12px}
.day.tod .dn::before{content:'오늘';position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;color:var(--g);background:var(--sf);padding:0 3px;border-radius:3px;line-height:1.4;white-space:nowrap}
.day.sel{background:rgba(234,88,12,.13);border-radius:8px;outline:2.5px solid #ea580c;outline-offset:-1px}.day.sel .dn{background:#ea580c;color:#fff;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;box-shadow:0 2px 8px rgba(234,88,12,.45)}.day.has .dn{font-weight:700}
.day.played .dn{width:21px;height:21px;border-radius:50%;border:2px solid #2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;color:#2563eb}
.day.played.tod .dn{background:var(--g);border-color:#fff;color:#fff}
.day.missed .dn{position:relative;color:var(--mt);opacity:.6}
.day.missed .dn::after{content:'✕';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:15px;color:#ef4444;font-weight:700;opacity:.85}
.dn{font-size:11px;line-height:1;color:var(--tx);position:relative}
.edots{display:flex;gap:3px;justify-content:center;margin-top:1px}
.edot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}.edot.p{background:var(--am)}
.edot.c0{background:#facc15}.edot.c1{background:#22c55e}.edot.c2{background:#ef4444}
.edot.done{width:8px;height:8px;background:#2563eb;box-shadow:0 0 0 1.5px rgba(37,99,235,.25)}
.spanel,.vpanel{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.sphdr,.vphdr{padding:10px 12px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:6px}
.vptit{font-size:13px;font-weight:600;flex:1}
.tabbar{display:flex;border-bottom:.5px solid var(--bd)}
.tabbtn{flex:1;padding:8px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--mt);border-bottom:2px solid transparent}
.tabbtn.on{color:var(--g);border-bottom-color:var(--g);font-weight:500}
.sitem{padding:10px 12px;border-bottom:.5px solid var(--bd);cursor:pointer}.sitem:last-child{border-bottom:none}
.vrow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:.5px solid var(--bd)}.vrow:last-child{border-bottom:none}
.vbtns{display:flex;gap:4px;margin-left:auto}
.frow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:.5px solid var(--bd)}.frow:last-child{border-bottom:none}
.pbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:100%;background:var(--g);border-radius:2px}
.mttbar{display:flex;gap:6px;margin-bottom:8px}
.mtt{padding:6px 14px;font-size:12px;border-radius:7px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);font-weight:500}
.mtt.as{background:#f59e0b;color:#fff}.mtt.ad{background:var(--g);color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.pcard{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:9px;border:1.5px solid var(--bd);cursor:pointer}
.pcard .pav{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gd);background:var(--gl)}
.pcard .pnm{font-size:10px;color:var(--mt);text-align:center;line-height:1.3}
.pcard.win{border-color:var(--g);background:rgba(22,163,74,.12)}.pcard.win .pav{background:var(--g);color:#fff}.pcard.win .pnm{color:var(--g);font-weight:700}
.pcard.lose{border-color:var(--rd);background:var(--rl)}.pcard.lose .pav{background:var(--rd);color:#fff}.pcard.lose .pnm{color:var(--rd);font-weight:700}
.mleg{font-size:11px;color:var(--mt);margin-bottom:8px;display:flex;gap:8px}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:2px}
.mitem{border:.5px solid var(--bd);border-radius:8px;padding:9px 12px;margin-bottom:6px}
.pnrow{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:.5px solid var(--bd)}.pnrow:last-child{border-bottom:none}
.pninfo{flex:1;min-width:0}
.pnname{font-size:13px;font-weight:500;margin-bottom:5px}
.pnbtns{display:flex;gap:4px}
.pb{padding:4px 8px;font-size:11px;border-radius:6px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--mt);white-space:nowrap}
.pb.kok{background:#f0fdf4;color:#16a34a;border-color:#86efac;font-weight:700}
.pb.klate{background:var(--aml);color:#b45309;border-color:#fcd34d;font-weight:700}
.pb.kday{background:#fff7ed;color:#c2410c;border-color:#fb923c;font-weight:700}
.pb.kprev{background:var(--rl);color:var(--rd);border-color:#fca5a5;font-weight:700}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.scard{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:10px}
.slbl{font-size:10px;color:var(--mt);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.sval{font-size:20px;font-weight:600}
.mrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:.5px solid var(--bd)}.mrow:last-child{border-bottom:none}
.mname{flex:1;font-size:13px;font-weight:500}
.rbar{height:4px;background:var(--bd);border-radius:2px;margin-top:3px;overflow:hidden}
.rfill{height:100%;border-radius:2px}
.cbar{padding:10px 12px;border-bottom:.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cme{display:flex;align-items:center;gap:6px;background:var(--gl);border-radius:8px;padding:5px 10px}
.cme-av{width:22px;height:22px;border-radius:5px;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cme-nm{font-size:13px;font-weight:600;color:var(--gd)}
.cmsgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:0}
.mrow2{display:flex;gap:6px;align-items:flex-end}.mrow2.me{flex-direction:row-reverse}
.mav2{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.mbody{max-width:75%}
.sndr{font-size:10px;color:var(--mt);margin-bottom:2px}
.bubble{padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4;word-break:break-word}
.bo{background:var(--bd);color:var(--tx)}.bm{background:var(--g);color:#fff}
.mtime{font-size:10px;color:var(--mt);margin-top:2px}.mrow2.me .mtime{text-align:right}
.datdiv{text-align:center;margin:3px 0;font-size:10px;color:var(--mt)}
.cinpbar{padding:8px 12px;border-top:.5px solid var(--bd);background:var(--sf);display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.cinp{flex:1;padding:8px 10px;border:.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--sf);color:var(--tx);resize:none;min-height:36px;max-height:80px;line-height:1.4;font-family:inherit;outline:none}
.cinp:focus{border-color:var(--g)}
.sbtn{width:36px;height:36px;border-radius:7px;background:var(--g);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cempty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:13px;text-align:center}
.empty{text-align:center;padding:28px;color:var(--mt);font-size:13px}
.hint{font-size:11px;color:var(--rd);min-height:16px;margin-top:4px}
.fab{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));right:14px;width:48px;height:48px;border-radius:10px;background:var(--g);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 12px rgba(26,86,176,.4)}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:flex-end;justify-content:center}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:14px 14px 0 0;padding:18px 14px calc(30px + env(safe-area-inset-bottom));width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal-assign{display:flex;flex-direction:column;height:85vh;overflow:hidden}
.modal-assign h3{flex-shrink:0}
.mac{display:flex;gap:8px;margin-top:12px}.mac .btn{flex:1;justify-content:center;padding:12px}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:var(--mt);display:block;margin-bottom:3px;font-weight:500}
.fg input{width:100%;padding:8px 10px;border:.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--sf);color:var(--tx)}
.court-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.court-btn{padding:6px 10px;font-size:11px;border-radius:7px;border:.5px solid var(--g);background:var(--g);color:#fff;cursor:pointer;font-weight:500}
.assign-game{background:var(--sf);border-radius:8px;padding:10px;margin-bottom:6px;border:.5px solid var(--bd)}
.assign-team{display:flex;align-items:center;gap:6px;padding:4px 0;flex-wrap:wrap}
.rank-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:.5px solid var(--bd)}.rank-row:last-child{border-bottom:none}
.elo-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--gl);color:var(--g)}
.streak-badge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;white-space:nowrap}
.streak-s{background:#fef3c7;color:#92400e}.streak-d{background:var(--gl);color:var(--gd)}
.mvp-card{background:linear-gradient(135deg,#0f2d5e,#1a56b0);border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
.setup{position:fixed;inset:0;background:#0f2d5e;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px}
.setup.hide{display:none}
.setup-card{background:rgba(255,255,255,.1);border-radius:14px;padding:20px;width:100%;max-width:340px;border:1px solid rgba(255,255,255,.15)}
.setup-card label{color:rgba(255,255,255,.7);font-size:12px;display:block;margin-bottom:6px;font-weight:500}
.setup-inp{width:100%;padding:11px 12px;border-radius:9px;font-size:15px;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.2)}
.setup-inp::placeholder{color:rgba(255,255,255,.4)}
.setup-inp:focus{outline:none;border-color:#e8b923}
.setup-hint{font-size:11px;min-height:16px;margin-top:6px;color:#e8b923}
.setup-btn{width:100%;padding:13px;border-radius:10px;background:#e8b923;color:#0f2d5e;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:14px}
.loading{position:fixed;inset:0;background:#0f2d5e;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#e8b923;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading" id="loading"><div style="font-size:40px">🎾</div><div style="color:#fff;font-size:20px;font-weight:700">테니스병동</div><div class="spinner"></div></div>
<div class="setup hide" id="setup">
  <div style="font-size:40px">🎾</div>
  <div style="color:#fff;font-size:22px;font-weight:700">테니스병동</div>
  <div style="color:rgba(255,255,255,.6);font-size:14px;text-align:center;line-height:1.5">이름을 입력하면 자동으로<br>멤버에 등록됩니다</div>
  <div class="setup-card">
    <label>내 이름</label>
    <input class="setup-inp" id="si" placeholder="이름 입력..." autocomplete="off" list="slist">
    <datalist id="slist"></datalist>
    <div id="pin-wrap" style="display:none;margin-top:14px">
      <label id="pin-label">PIN 4자리</label>
      <input class="setup-inp" id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" style="letter-spacing:8px;text-align:center;font-size:20px">
    </div>
    <div class="setup-hint" id="sh"></div>
    <button class="setup-btn" id="sb">시작하기 →</button>
  </div>
</div>
<div class="app">
  <div class="hdr">
    <div class="htitle"><i class="ti ti-sport-billard"></i> 테니스병동 <span class="htag">[TBD]</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <div style="color:rgba(255,255,255,.5);font-size:12px" id="tlbl"></div>
      <div class="me-badge" id="me-badge" style="cursor:pointer"><div class="me-av" id="mav"></div><span class="me-nm" id="mnm"></span></div>
    </div>
    <div class="gline"></div>
    <div class="ulabel">📌 최근 & 다가오는 일정</div>
    <div class="ustrip" id="ustrip"></div>
  </div>
  <nav class="nav" id="mainnav"></nav>
  <div class="pg on" id="page-cal"><div id="calwrap"></div></div>

function isGuestId(id){const m=(S.members||[]).find(x=>x.id===id);return m&&m.guest;}

function calcELOs(){const elo={singles:{},doubles:{}};(S.members||[]).forEach(m=>{if(m.guest)return;elo.singles[m.id]=1000;elo.doubles[m.id]=1000;});[...(S.matches||[])].filter(m=>m.score&&m.winners&&m.winners.length&&m.losers&&m.losers.length&&!hasGuest(m)).sort((a,b)=>(a.time||0)-(b.time||0)).forEach(m=>{const K=32,t=m.type==='singles'?'singles':'doubles';const avgW=m.winners.reduce((s,id)=>s+(elo[t][id]||1000),0)/Math.max(m.winners.length,1);const avgL=m.losers.reduce((s,id)=>s+(elo[t][id]||1000),0)/Math.max(m.losers.length,1);const delta=K*(1-1/(1+Math.pow(10,(avgL-avgW)/400)));m.winners.forEach(id=>{if(elo[t][id]!==undefined)elo[t][id]+=delta;});m.losers.forEach(id=>{if(elo[t][id]!==undefined)elo[t][id]-=delta;});});return elo;}

function playedSessionIds(){

}

function getBestPlayer(filter){
  // filter: fn(match) => bool, 해당 기간 경기 필터
  const wins={},losses={};
  (S.matches||[]).filter(m=>m.time&&m.score&&m.winners&&m.losers&&!hasGuest(m)).filter(filter).forEach(m=>{
    (m.winners||[]).forEach(id=>{if(!isGuestId(id)){wins[id]=(wins[id]||0)+1;}});
    (m.losers||[]).forEach(id=>{if(!isGuestId(id)){losses[id]=(losses[id]||0)+1;}});
  });
  const all=new Set([...Object.keys(wins),...Object.keys(losses)]);
  if(!all.size)return null;
  // 승수 기준, 동률이면 승률
  const ranked=[...all].map(id=>{const w=wins[id]||0,l=losses[id]||0;return{id,w,l,rate:w+l?w/(w+l):0};})
    .sort((a,b)=>b.w-a.w||b.rate-a.rate);
  const top=ranked[0];
  return top&&top.w>0?top:null;
}
function getAtt(mid){
  // 모수: 확정 경기(점수+승자)가 하나라도 있는 날짜만 포함

  // 그날 세션 중 하나라도 yes면 참석
  const played=playedSessionIds();
  const allSessions=(S.sessions||[]).filter(s=>played.has(s.id));
  const byDate={};
  allSessions.forEach(s=>{
    if(!byDate[s.date])byDate[s.date]=[];
    byDate[s.date].push(s);
  });
  const days=Object.values(byDate);
  const t=days.length;if(!t)return 0;
  const attended=days.filter(group=>group.some(s=>(S.votes[s.id]||{})[mid]==='yes')).length;
  return Math.round(attended/t*100);
}
function getMonthlyMVP(){const now=new Date(),month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;const wins={};(S.matches||[]).forEach(m=>{if(!m.time||!m.score)return;if(hasGuest(m))return;const d=new Date(m.time);if(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`!==month)return;(m.winners||[]).forEach(id=>{if(isGuestId(id))return;wins[id]=(wins[id]||0)+1;});});const top=Object.entries(wins).sort((a,b)=>b[1]-a[1])[0];return top&&top[1]>0?{id:top[0],wins:top[1]}:null;}
function getPairCnt(id1,id2){return(S.matches||[]).filter(m=>{if(hasGuest(m))return false;const a=[...(m.winners||[]),...(m.losers||[])];return a.includes(id1)&&a.includes(id2);}).length;}

function genDoublesGames(members,count){const games=[];const lp={};const pk=(a,b)=>[a,b].sort().join('|');members.forEach((a,i)=>members.slice(i+1).forEach(b=>{lp[pk(a.id,b.id)]=0;}));for(let g=0;g<count;g++){const combos=[];for(let i=0;i<members.length;i++)for(let j=i+1;j<members.length;j++){const t1=[members[i],members[j]];const rest=members.filter(m=>!t1.includes(m));if(rest.length<2)continue;for(let a=0;a<rest.length;a++)for(let b=a+1;b<rest.length;b++){const t2=[rest[a],rest[b]];combos.push({t1,t2,score:lp[pk(t1[0].id,t1[1].id)]+lp[pk(t2[0].id,t2[1].id)]});}}if(!combos.length)break;combos.sort((a,b)=>a.score-b.score);const best=combos[0];games.push({t1:best.t1,t2:best.t2,gtype:'doubles'});lp[pk(best.t1[0].id,best.t1[1].id)]+=2;lp[pk(best.t2[0].id,best.t2[1].id)]+=2;}return games;}
function genSinglesGames(members,count){const games=[];const lp={};const pk=(a,b)=>[a,b].sort().join('|');members.forEach((a,i)=>members.slice(i+1).forEach(b=>{lp[pk(a.id,b.id)]=0;}));for(let g=0;g<count;g++){const combos=[];for(let i=0;i<members.length;i++)for(let j=i+1;j<members.length;j++){combos.push({t1:[members[i]],t2:[members[j]],score:lp[pk(members[i].id,members[j].id)]});}if(!combos.length)break;combos.sort((a,b)=>a.score-b.score);const best=combos[0];games.push({t1:best.t1,t2:best.t2,gtype:'singles'});lp[pk(best.t1[0].id,best.t2[0].id)]+=2;}return games;}

function feeShare(s){
  // 세션별 각 멤버 부담액 계산 {mid: amount}
  const v=S.votes[s.id]||{},fee=S.fees[s.id]||{total:0,paid:{}};
  const att=(S.members||[]).filter(m=>v[m.id]==='yes');
  const result={};
  if(!fee.total||!att.length)return result;
  const mode=fee.mode||'split';
  if(mode==='treat'&&fee.payer){
    // 한 사람 몰아주기
    result[fee.payer]=fee.total;
  } else if(mode==='exempt'){
    // 면제자 제외 N빵
    const ex=new Set(fee.exempt||[]);
    const payers=att.filter(m=>!ex.has(m.id));
    if(payers.length){const per=Math.round(fee.total/payers.length);payers.forEach(m=>{result[m.id]=per;});}
  } else {
    // N빵
    const per=Math.round(fee.total/att.length);att.forEach(m=>{result[m.id]=per;});
  }
  return result;
}

function sixSplitSchedule(members,rounds,teamA,teamB){

  let a,b;
  if(teamA&&teamB&&teamA.length===3&&teamB.length===3){
    a=teamA.map(id=>members.find(m=>m.id===id)).filter(Boolean);
    b=teamB.map(id=>members.find(m=>m.id===id)).filter(Boolean);
  }
  if(!a||!b||a.length!==3||b.length!==3){
    const sh=[...members].sort(()=>Math.random()-0.5);
    a=sh.slice(0,3);b=sh.slice(3,6);
  }
  const playCnt={},restCnt={},singlesCnt={},doublesCnt={};
  members.forEach(m=>{playCnt[m.id]=0;restCnt[m.id]=0;singlesCnt[m.id]=0;doublesCnt[m.id]=0;});
  // 각 라운드 = 단식 나갈 사람 (sa,sb). 나머지 2명씩 복식.
  // 단식 상대쌍 (sa,sb)이 안 겹치도록 9개 조합을 라틴방진 순서로 뽑되,
  // sa·sb 각각이 균등하게 나오게 정렬 → 단/복식 횟수 자동 균등.
  // 라틴방진: sb=(sa+shift)%3, shift를 0,1,2 순환 → 9쌍 모두 유일
  const allPairs=[];
  for(let shift=0;shift<3;shift++)for(let sa=0;sa<3;sa++)allPairs.push([sa,(sa+shift)%3]);
  // allPairs 9개는 (sa,sb) 전부 유일. 앞에서부터 rounds개 사용 (9R까지 상대 안 겹침)
  const sched=[];
  for(let r=0;r<rounds;r++){
    const [sa,sb]=allPairs[r%9];
    const aRest=[0,1,2].filter(i=>i!==sa),bRest=[0,1,2].filter(i=>i!==sb);
    const t1=[a[aRest[0]],a[aRest[1]]];
    const t2=[b[bRest[0]],b[bRest[1]]];
    const s1=a[sa],s2=b[sb];
    [...t1,...t2].forEach(m=>{playCnt[m.id]++;doublesCnt[m.id]++;});
    [s1,s2].forEach(m=>{playCnt[m.id]++;singlesCnt[m.id]++;});
    sched.push({round:r+1,games:[
      {court:1,gtype:'doubles',t1,t2},
      {court:2,gtype:'singles',t1:[s1],t2:[s2]},
    ],resting:[]});
  }
  return {schedule:sched,playCnt,restCnt,singlesCnt,doublesCnt};
}
function multiCourtSchedule(members,courts,rounds,mode){
  // members: [{id,name}], courts: 코트수, rounds: 라운드수, mode: 'singles'|'doubles'|'mix'|'six33'
  if(mode==='six33')return sixSplitSchedule(members,rounds,sixTeamA,sixTeamB);
  const n=members.length;
  const playCnt={},restCnt={},singlesCnt={},doublesCnt={};
  members.forEach(m=>{playCnt[m.id]=0;restCnt[m.id]=0;singlesCnt[m.id]=0;doublesCnt[m.id]=0;});
  const pairPartner={},pairOpp={};
  const pk=(a,b)=>[a,b].sort().join('|');
  // 과거 전적은 무시하고 그날 경기만으로 다양성 계산 (0부터 시작)
  members.forEach((a,i)=>members.slice(i+1).forEach(b=>{pairPartner[pk(a.id,b.id)]=0;pairOpp[pk(a.id,b.id)]=0;}));
  const schedule=[];
  for(let r=0;r<rounds;r++){
    // 이번 라운드 각 코트의 경기 방식을 먼저 결정
    const courtTypes=[];
    for(let ci=0;ci<courts;ci++){
      if(mode==='mix')courtTypes.push(ci%2===0?'doubles':'singles');
      else courtTypes.push(mode);
    }
    const roundGames=[];
    const used=new Set();
    courtTypes.forEach((gtype,ci)=>{
      const need=gtype==='doubles'?4:2;
      let avail=members.filter(m=>!used.has(m.id));
      // 인원 부족하면 방식 강등 (복식→단식), 그래도 부족하면 스킵
      let realType=gtype,realNeed=need;
      if(avail.length<need){
        if(avail.length>=2){realType='singles';realNeed=2;}else return;
      }
      // 선발 우선순위: ① 총 경기수 적은 순 → ② 해당 종류 경기수 적은 순 → ③ 랜덤
      const typeCnt=realType==='singles'?singlesCnt:doublesCnt;
      avail=avail.sort((a,b)=>(playCnt[a.id]-playCnt[b.id])||(typeCnt[a.id]-typeCnt[b.id])||(Math.random()-0.5));
      // 가장 적게 뛴 realNeed명을 "반드시" 포함 + 대진 다양성 위해 후보 약간 추가
      const must=avail.slice(0,realNeed);
      const extra=avail.slice(realNeed,realNeed+2);
      const cand=[...must,...extra];
      let best=null,bestScore=Infinity;
      if(realType==='doubles'){
        for(let i=0;i<cand.length;i++)for(let j=i+1;j<cand.length;j++){
          const t1=[cand[i],cand[j]];const rest=cand.filter(m=>!t1.includes(m));
          for(let a=0;a<rest.length;a++)for(let b=a+1;b<rest.length;b++){
            const t2=[rest[a],rest[b]];
            const four=[t1[0],t1[1],t2[0],t2[1]];
            // 적게 뛴 사람이 빠지면 페널티 (형평성 우선)
            const fairPenalty=four.reduce((s,m)=>s+playCnt[m.id]*3+typeCnt[m.id],0);
            const diversity=pairPartner[pk(t1[0].id,t1[1].id)]+pairPartner[pk(t2[0].id,t2[1].id)]+0.5*(pairOpp[pk(t1[0].id,t2[0].id)]+pairOpp[pk(t1[0].id,t2[1].id)]+pairOpp[pk(t1[1].id,t2[0].id)]+pairOpp[pk(t1[1].id,t2[1].id)]);
            const sc=fairPenalty*10+diversity;
            if(sc<bestScore){bestScore=sc;best={t1,t2};}
          }
        }
      } else {
        for(let i=0;i<cand.length;i++)for(let j=i+1;j<cand.length;j++){
          const fairPenalty=(playCnt[cand[i].id]+playCnt[cand[j].id])*3+(typeCnt[cand[i].id]+typeCnt[cand[j].id]);
          const sc=fairPenalty*10+pairOpp[pk(cand[i].id,cand[j].id)];
          if(sc<bestScore){bestScore=sc;best={t1:[cand[i]],t2:[cand[j]]};}
        }
      }
      if(!best)return;
      [...best.t1,...best.t2].forEach(m=>used.add(m.id));
      if(realType==='doubles'){pairPartner[pk(best.t1[0].id,best.t1[1].id)]+=2;pairPartner[pk(best.t2[0].id,best.t2[1].id)]+=2;}
      best.t1.forEach(a=>best.t2.forEach(b=>{pairOpp[pk(a.id,b.id)]=(pairOpp[pk(a.id,b.id)]||0)+1;}));
      best.t1.concat(best.t2).forEach(m=>{playCnt[m.id]++;if(realType==='singles')singlesCnt[m.id]++;else doublesCnt[m.id]++;});
      roundGames.push({court:ci+1,gtype:realType,t1:best.t1,t2:best.t2});
    });
    const resting=members.filter(m=>!used.has(m.id));
    resting.forEach(m=>restCnt[m.id]++);
    schedule.push({round:r+1,games:roundGames,resting});
  }
  return{schedule,playCnt,restCnt,singlesCnt,doublesCnt};
}

  if(tab==='match'){
    return (S.matches||[]).some(m=>m.locked&&m.resultBy&&m.resultBy!==myId&&(m.resultAt||0)>seen);
  }
  if(tab==='stats'){

// 3:3 조 편성 UI
function renderSixTeams(att){
  let wrap=G('six33-teams');
  if(!wrap){wrap=document.createElement('div');wrap.id='six33-teams';wrap.style.cssText='margin-bottom:10px';G('six33-info').after(wrap);}
  wrap.style.display='';
  const aCnt=Object.values(sixPicks).filter(p=>p==='A').length;
  const bCnt=Object.values(sixPicks).filter(p=>p==='B').length;
  wrap.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label style="font-size:11px;color:var(--mt);font-weight:500">조 편성 (탭해서 지정 · 안 정하면 랜덤)</label><button id="six-shuffle" style="font-size:11px;padding:4px 10px;border-radius:6px;border:.5px solid var(--g);background:var(--gl);color:var(--g);font-weight:600;cursor:pointer">🎲 랜덤</button></div><div style="display:flex;gap:6px;margin-bottom:6px"><span style="font-size:11px;color:var(--g);font-weight:600">A조 ${aCnt}/3</span><span style="font-size:11px;color:#d97706;font-weight:600">B조 ${bCnt}/3</span></div>`;
  const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:6px';
  att.forEach(m=>{
    const pk=sixPicks[m.id];
    const card=document.createElement('div');
    const bg=pk==='A'?'var(--gl)':pk==='B'?'#fef3e7':'var(--sf)';
    const bd=pk==='A'?'var(--g)':pk==='B'?'#d97706':'var(--bd)';
    card.style.cssText=`display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:9px;border:1.5px solid ${bd};background:${bg};cursor:pointer`;
    const tag=pk?`<div style="font-size:9px;font-weight:700;color:${pk==='A'?'var(--g)':'#d97706'}">${pk}조</div>`:'<div style="font-size:9px;color:var(--mt)">미지정</div>';
    card.innerHTML=`<div class="av" style="background:${mcol(m.id)};color:#fff;width:30px;height:30px;font-size:11px">${ini(m.name)}</div><div style="font-size:11px;font-weight:500">${m.name}</div>${tag}`;
    card.addEventListener('click',()=>{
      const cur=sixPicks[m.id];
      const aC=Object.values(sixPicks).filter(p=>p==='A').length;
      const bC=Object.values(sixPicks).filter(p=>p==='B').length;
      if(cur==='A'){sixPicks[m.id]=bC<3?'B':null;}
      else if(cur==='B'){sixPicks[m.id]=null;}
      else{if(aC<3)sixPicks[m.id]='A';else if(bC<3)sixPicks[m.id]='B';}
      renderSixTeams(att);
    });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  const sh=wrap.querySelector('#six-shuffle');
  if(sh)sh.addEventListener('click',()=>{const s=[...att].sort(()=>Math.random()-0.5);sixPicks={};s.slice(0,3).forEach(m=>sixPicks[m.id]='A');s.slice(3,6).forEach(m=>sixPicks[m.id]='B');renderSixTeams(att);});
}

function upstrip(keepScroll){
  const ts=iso(new Date());
  G('tlbl').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const el=G('ustrip');
  const prevScroll=el.scrollLeft;
  el.innerHTML='';
  const all=[...(S.sessions||[])].sort((a,b)=>a.date.localeCompare(b.date));
  // 선택된 일정이 없거나 삭제됐으면 → 오늘 이후 첫 일정(없으면 가장 최근 지난 일정) 자동 선택
  if(!selSid||!all.find(s=>s.id===selSid)){
    const next=all.find(s=>s.date>=ts)||all[all.length-1];
    if(next){selSid=next.id;mSess=next.id;pnSess=next.id;const dt=new Date(next.date+'T00:00:00');calY=dt.getFullYear();calM=dt.getMonth();selD=next.date;}
  }
  const past=all.filter(s=>s.date<ts);
  const future=all.filter(s=>s.date>=ts);
  const show=[...past,...future];
  if(!show.length){el.innerHTML='<div style="color:rgba(255,255,255,.45);font-size:12px;padding:6px 0">일정 없음</div>';return;}
  let scrollTarget=null;
  show.forEach(s=>{
    const v=S.votes[s.id]||{},_vm=(S.members||[]).filter(m=>!m.guest||m.sessionId===s.id),yes=_vm.filter(m=>v[m.id]==='yes').length,no=_vm.filter(m=>v[m.id]==='no').length,pend=_vm.filter(m=>!v[m.id]).length;
    const tod=s.date===ts,isPast=s.date<ts,sel=(selSid===s.id),hasMatch=playedSessionIds().has(s.id);
    const d=document.createElement('div');d.className='ucard'+(tod?' tod':'');
    if(isPast){d.style.opacity='0.5';}
    if(sel){d.style.background='#fff';d.style.color='#1a1a2e';d.style.boxShadow='0 3px 14px rgba(0,0,0,.3)';d.style.outline='2px solid #1a56b0';d.style.outlineOffset='-1px';d.style.opacity='1';d.style.transition='background .15s,box-shadow .15s';}
    const dateColor=sel?'#1a56b0':'';const courtColor=sel?'#1a1a2e':'';const timeColor=sel?'#555':'';
    d.innerHTML=`<div class="udate" style="color:${dateColor||''}">${tod?'🎾 오늘':isPast?(hasMatch?'✓ ':'✗ ')+fmts(s.date):fmts(s.date)}</div><div class="ucourt" style="color:${courtColor||''}">${s.court}</div>${s.time?`<div class="utime" style="color:${timeColor||''}">${s.time}</div>`:''}<div class="upills"><span class="upill" style="background:rgba(34,197,94,.35)${sel?';color:#166534':''}">참${yes}</span><span class="upill" style="background:rgba(239,68,68,.35)${sel?';color:#991b1b':''}">불${no}</span><span class="upill" style="background:rgba(232,185,35,.35)${sel?';color:#92400e':''}">미${pend}</span></div>`;
    d.addEventListener('click',()=>{const dt=new Date(s.date+'T00:00:00');calY=dt.getFullYear();calM=dt.getMonth();selD=s.date;selSid=s.id;mSess=s.id;pnSess=s.id;picks={};upstrip(true);if(page==='match'){rMatch();}else if(page==='penalty'){rPenalty();}else if(page==='stats'||page==='chat'||page==='admin'){/* 탭 유지 */}else{goPage('cal');}});
    el.appendChild(d);
    // 스크롤 목표: 선택된 카드 > 오늘 > 첫 미래 일정
    if(sel)scrollTarget=d;
    else if(!scrollTarget&&tod)scrollTarget=d;
    else if(!scrollTarget&&!isPast)scrollTarget=d;
  });
  // keepScroll(클릭 등): 현재 위치 유지 / 아니면(첫 로드·갱신): 목표 카드로 자동 스크롤
  if(keepScroll){el.scrollLeft=prevScroll;}
  else if(scrollTarget){requestAnimationFrame(()=>{const left=scrollTarget.offsetLeft-8;el.scrollTo({left:left>0?left:0,behavior:'auto'});});}
}
// 달력 그리드 좌우 스와이프 → 월 전환
function attachSwipe(grid){
  let sx=0,sy=0,active=false,dragging=false,gridW=0;
  const TH=50; // 페이지 전환 임계값(px)
  const reset=(anim)=>{grid.style.transition=anim?'transform .2s ease':'none';grid.style.transform='translateX(0)';if(anim)setTimeout(()=>{grid.style.transition='';},220);};
  // 손가락/마우스 따라 이동
  function onStart(x,y){sx=x;sy=y;active=true;dragging=false;gridW=grid.offsetWidth||300;grid.style.transition='none';}
  function onMove(x,y,ev){
    if(!active)return;
    const dx=x-sx,dy=y-sy;
    if(!dragging){
      // 가로가 세로보다 확실히 클 때만 드래그 시작 (세로 스크롤 보호)
      if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.2){dragging=true;}
      else if(Math.abs(dy)>10){active=false;return;} // 세로 스크롤로 판단
      else return;
    }
    if(dragging){if(ev&&ev.cancelable)ev.preventDefault();const damp=dx*0.85;grid.style.transform=`translateX(${damp}px)`;grid.style.opacity=String(1-Math.min(Math.abs(dx)/gridW,0.4));}
  }
  function onEnd(x){
    if(!active){return;}active=false;
    if(!dragging){reset(false);return;}
    const dx=x-sx;
    grid.style.opacity='1';
    if(Math.abs(dx)>TH){
      // 화면 밖으로 슬라이드 후 달 전환
      const dir=dx<0?1:-1;
      grid.style.transition='transform .15s ease, opacity .15s ease';
      grid.style.transform=`translateX(${dir<0?gridW:-gridW}px)`;
      grid.style.opacity='0';
      setTimeout(()=>calShift(dir),150);
    } else {
      reset(true); // 임계값 미달 → 제자리로 튕김
    }
  }
  grid.addEventListener('touchstart',e=>{const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  grid.addEventListener('touchmove',e=>{const t=e.touches[0];onMove(t.clientX,t.clientY,e);},{passive:false});
  grid.addEventListener('touchend',e=>{const t=e.changedTouches[0];onEnd(t.clientX);},{passive:true});
  // 데스크탑 마우스
  grid.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);});
  grid.addEventListener('mousemove',e=>{if(active)onMove(e.clientX,e.clientY,e);});
  grid.addEventListener('mouseup',e=>{onEnd(e.clientX);});

  if(!isAdmin()&&v[myId]!=='yes'){showErr('이 일정에 참가한 멤버만 대진을 추가할 수 있습니다');return;}

  if(sel.length===2){
    if(!S.matches)S.matches=[];
    S.matches.push({id:'g'+Date.now(),sessionId:mSess,type:'singles',teamA:[sel[0]],teamB:[sel[1]],winners:[],losers:[],score:'',pending:true,time:Date.now()});

    // 선수 미선택: 참석자 수에 따라 자동 처리
    if(att.length===2){
      // 2명이면 바로 단식 추가
      if(!S.matches)S.matches=[];
      S.matches.push({id:'g'+Date.now(),sessionId:mSess,type:'singles',teamA:[att[0].id],teamB:[att[1].id],winners:[],losers:[],score:'',pending:true,time:Date.now()});
      picks={};saveS();rMatch();
    } else if(att.length===4){
      // 4명이면 바로 팀 나누기 팝업
      openTeamSplit(att.map(m=>m.id));
    } else if(att.length===3){
      openAutoSelModal(att,'singles');
    } else if(att.length>4){
      openAutoSelModal(att,'doubles');
    } else {
      showErr('참석자가 2명 이상이어야 합니다');
    }
  } else {
    showErr('단식은 2명, 복식은 4명을 선택해주세요');

function rStats(){
  const el=G('statslist');el.innerHTML='';

  let mvpPeriod=sessionStorage.getItem('mvpPeriod')||'month';
  const mvpWrap=document.createElement('div');
  let mvpOffset=parseInt(sessionStorage.getItem('mvpOffset')||'0');
  const renderMVP=()=>{
    // offset: 0=현재, -1=이전, +1=다음 (미래는 막음)
    const base=new Date(now.getFullYear(),now.getMonth(),1);
    let yr,mo,q,label,filter;
    if(mvpPeriod==='month'){
      const d=new Date(base.getFullYear(),base.getMonth()+mvpOffset,1);
      yr=d.getFullYear();mo=d.getMonth()+1;
      label=`${yr}년 ${mo}월`;
      filter=m=>{const dd=new Date(m.time);return dd.getFullYear()===yr&&dd.getMonth()+1===mo;};
    } else if(mvpPeriod==='quarter'){
      const totalQ=Math.floor(mvpOffset);
      const curQ=Math.ceil((now.getMonth()+1)/3);
      const absQ=(now.getFullYear()-2000)*4+curQ-1+totalQ;
      yr=2000+Math.floor(absQ/4);q=(absQ%4+4)%4+1;
      const qStart=(q-1)*3+1,qEnd=q*3;
      label=`${yr}년 ${q}분기 (${qStart}~${qEnd}월)`;
      filter=m=>{const dd=new Date(m.time);const dq=Math.ceil((dd.getMonth()+1)/3);return dd.getFullYear()===yr&&dq===q;};
    } else {
      yr=now.getFullYear()+mvpOffset;
      label=`${yr}년`;
      filter=m=>new Date(m.time).getFullYear()===yr;
    }
    const isPresent=mvpOffset===0;
    const best=getBestPlayer(filter);

    mvpWrap.innerHTML=`<div style="display:flex;justify-content:center;gap:4px;margin-bottom:10px">${tabs}</div><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px"><button data-nav="-1" style="${navStyle}">‹</button><span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.85)">${label}</span><button data-nav="1" style="${navStyle};opacity:${isPresent?0.3:1};pointer-events:${isPresent?'none':'auto'}">›</button></div><div style="font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px">Best Player 🏆</div>${content2}`;
    mvpWrap.querySelectorAll('[data-mvpp]').forEach(t=>{t.addEventListener('click',e=>{e.stopPropagation();mvpPeriod=t.getAttribute('data-mvpp');mvpOffset=0;sessionStorage.setItem('mvpPeriod',mvpPeriod);sessionStorage.setItem('mvpOffset','0');renderMVP();});});

    let _sx=0,_active=false,_drag=false;
    mvpWrap.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;_active=true;_drag=false;},{passive:true});
    mvpWrap.addEventListener('touchmove',e=>{if(!_active)return;const dx=e.touches[0].clientX-_sx;if(!_drag&&Math.abs(dx)>10)_drag=true;},{passive:true});
    mvpWrap.addEventListener('touchend',e=>{if(!_drag)return;const dx=e.changedTouches[0].clientX-_sx;if(Math.abs(dx)>50){const dir=dx<0?-1:1;mvpOffset=Math.min(0,mvpOffset+dir);sessionStorage.setItem('mvpOffset',mvpOffset);renderMVP();}_active=false;_drag=false;});
    mvpWrap.addEventListener('mousedown',e=>{_sx=e.clientX;_active=true;_drag=false;});
    mvpWrap.addEventListener('mousemove',e=>{if(!_active)return;if(Math.abs(e.clientX-_sx)>10)_drag=true;});
    mvpWrap.addEventListener('mouseup',e=>{if(!_drag){_active=false;return;}const dx=e.clientX-_sx;if(Math.abs(dx)>50){const dir=dx<0?-1:1;mvpOffset=Math.min(0,mvpOffset+dir);sessionStorage.setItem('mvpOffset',mvpOffset);renderMVP();}_active=false;_drag=false;});
  };

  const ga=G('guest-add');if(ga)ga.style.display=isAdmin()?'flex':'none';
  const gb=G('guest-add-btn');if(gb&&!gb._bound){gb._bound=true;gb.addEventListener('click',()=>{const inp=G('guest-name');const name=(inp.value||'').trim();if(!name)return;if((S.members||[]).some(x=>x.name===name)){alert('이미 같은 이름이 있어요');return;}if(!S.members)S.members=[];S.members.push({id:'g'+Date.now(),name,guest:true});inp.value='';saveS();addLog('게스트 추가',name);rMembers();});}
  el.innerHTML='';if(!(S.members||[]).length){el.innerHTML='<div class="empty">아직 없어요</div>';return;}const card=document.createElement('div');card.className='card';card.addEventListener('click',function(e){const cp=e.target.closest('[data-colorpick]');if(cp){const id=cp.getAttribute('data-colorpick');const mm=(S.members||[]).find(x=>x.id===id);if(!mm)return;if(id!==myId&&!isAdmin())return;openColorPicker(id,mm,cp);return;}const edit=e.target.closest('[data-edit]');if(edit){const id=edit.getAttribute('data-edit');const mm=(S.members||[]).find(x=>x.id===id);if(!mm)return;if(id!==myId&&!isAdmin())return;const nv=prompt('이름을 입력하세요',mm.name);if(nv===null)return;const name=nv.trim();if(!name)return;if((S.members||[]).some(x=>x.id!==id&&x.name===name)){alert('이미 같은 이름이 있어요');return;}const old=mm.name;mm.name=name;if(id===myId)myName=name;saveS();saveU();updBadge();addLog('이름 변경',`${old} → ${name}`);rMembers();return;}if(!isAdmin())return;const rpin=e.target.closest('[data-rpin]');if(rpin){const id=rpin.getAttribute('data-rpin');const mm=(S.members||[]).find(x=>x.id===id);if(mm&&confirm(`${mm.name}님의 PIN을 초기화할까요?\n다음 로그인 때 새로 설정하게 됩니다.`)){delete mm.pin;saveS();addLog('PIN 초기화',mm.name);rMembers();}return;}const btn=e.target.closest('[data-del]');if(!btn)return;const id=btn.getAttribute('data-del');if(!id||id===S.adminId)return;if(pDel===id){clearTimeout(pDelT);pDel=null;S.members=S.members.filter(m=>m.id!==id);saveS();if(hint)hint.textContent='';rMembers();}else{if(pDel){clearTimeout(pDelT);pDel=null;}pDel=id;btn.style.color='var(--rd)';btn.style.background='var(--rl)';btn.style.borderRadius='6px';if(hint)hint.textContent='한 번 더 탭하면 삭제';pDelT=setTimeout(()=>{pDel=null;if(hint)hint.textContent='';rMembers();},2500);}});const elos=calcELOs();card.innerHTML=(S.members||[]).map(m=>{const isMe=m.id===myId,admin=m.id===S.adminId,isGuest=m.guest;if(isGuest){
  const gw=(S.matches||[]).filter(g=>g.score&&(g.winners||[]).includes(m.id)).length;
  const gl=(S.matches||[]).filter(g=>g.score&&(g.losers||[]).includes(m.id)).length;
  const gt=gw+gl;
  const gRate=gt?Math.round(gw/gt*100):null;
  const gRecord=gt?`${gw}승 ${gl}패${gRate!==null?' · '+gRate+'%':''}  `:'전적 없음';
  return`<div class="mrow"><div class="av" style="background:#94a3b8;color:#fff">${ini(m.name)}</div><div style="flex:1;min-width:0"><div class="mname">${m.name} <span style="font-size:9px;background:#e2e8f0;color:#64748b;padding:1px 6px;border-radius:4px">게스트</span></div><div style="font-size:10px;color:var(--mt);margin-top:3px">${gRecord}</div></div>${(isMe||isAdmin())?`<button class="ibtn" data-edit="${m.id}" title="이름 수정"><i class="ti ti-pencil"></i></button>`:''}${isAdmin()?`<button class="ibtn" data-del="${m.id}"><i class="ti ti-trash"></i></button>`:''}</div>`;}const ss=getStreak(m.id,'singles'),ds=getStreak(m.id,'doubles'),att=getAtt(m.id);const sElo=Math.round(elos.singles[m.id]||1000),dElo=Math.round(elos.doubles[m.id]||1000);const streaks=`${ss>=2?`<span class="streak-badge streak-s">🔥${ss}연</span> `:''}${ds>=2?`<span class="streak-badge streak-d">🎾${ds}연</span>`:''}`;const pinTag=m.pin?'<span style="font-size:9px;color:#16a34a;margin-left:4px">🔒</span>':'<span style="font-size:9px;color:var(--mt);margin-left:4px">PIN없음</span>';return`<div class="mrow"${isMe?' style="background:rgba(26,86,176,.04);border-radius:8px;"':''}><div class="av" style="background:${mcol(m.id)};color:#fff;cursor:${(isMe||isAdmin())?"pointer":"default"}" ${(isMe||isAdmin())?`data-colorpick="${m.id}"`:""} title="${(isMe||isAdmin())?"색상 변경":""}">${ini(m.name)}</div><div style="flex:1;min-width:0"><div class="mname">${m.name}${admin?' 👑':''}${isMe?' <span style="font-size:10px;color:var(--g);font-weight:600">• 나</span>':''}${pinTag} ${streaks}</div><div style="font-size:10px;color:var(--mt);margin-top:3px;display:flex;gap:8px"><span>단식 <b style="color:var(--g)">${sElo}</b></span><span>복식 <b style="color:#7c3aed">${dElo}</b></span><span>참석 <b>${att}%</b></span>${m.lastSeen?`<span style="color:var(--mt)">· ${ago(m.lastSeen)}</span>`:''}</div></div>${(isMe||isAdmin())?`<button class="ibtn" data-edit="${m.id}" title="이름 수정"><i class="ti ti-pencil"></i></button>`:''}${isAdmin()&&m.pin?`<button class="ibtn" data-rpin="${m.id}" title="PIN 초기화"><i class="ti ti-key"></i></button>`:''}${isAdmin()&&!admin?`<button class="ibtn" data-del="${m.id}"><i class="ti ti-trash"></i></button>`:''}</div>`;}).join('');el.appendChild(card);}
// ── 활동 로그 기록 헬퍼
function addLog(action,detail){if(!S.actlog)S.actlog=[];S.actlog.unshift({ts:Date.now(),who:myName||'?',action,detail});if(S.actlog.length>200)S.actlog.length=200;saveS();}

// ── 활동 로그 탭 렌더
function rActlog(){
  const el=G('logcontent');el.innerHTML='';
  const logs=S.actlog||[];
  if(!logs.length){el.innerHTML='<div class="empty">아직 활동 기록이 없어요</div>';return;}
  const card=document.createElement('div');card.className='card';
  logs.slice(0,100).forEach(log=>{
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:.5px solid var(--bd)';
    const av=document.createElement('div');av.className='av';av.style.cssText=`background:${col(log.who||'?')};color:#fff;flex-shrink:0;width:28px;height:28px;font-size:10px`;av.textContent=ini(log.who||'?');
    const info=document.createElement('div');info.style.flex='1';info.innerHTML=`<div style="font-size:12px;font-weight:500">${esc(log.who)} <span style="color:var(--mt);font-weight:400">${esc(log.action)}</span></div>${log.detail?`<div style="font-size:11px;color:var(--mt);margin-top:1px">${esc(log.detail)}</div>`:''}`;
    const ts=document.createElement('div');ts.style.cssText='font-size:10px;color:var(--mt);flex-shrink:0;padding-top:1px';const d=new Date(log.ts);ts.textContent=`${d.getMonth()+1}/${d.getDate()} ${ft(log.ts)}`;
    row.appendChild(av);row.appendChild(info);row.appendChild(ts);card.appendChild(row);
  });
  el.appendChild(card);
  if(isAdmin()&&logs.length>0){const clrBtn=document.createElement('button');clrBtn.className='btn btno';clrBtn.style.cssText='width:100%;margin-top:10px;color:var(--rd);border-color:var(--rd)';clrBtn.textContent='🗑️ 로그 전체 삭제 (관리자)';clrBtn.addEventListener('click',()=>{if(confirm('활동 로그를 전부 삭제할까요?')){S.actlog=[];saveS();rActlog();}});el.appendChild(clrBtn);}
}

function render(){if(page==='cal')rCal();else if(page==='match')rMatch();else if(page==='penalty')rPenalty();else if(page==='stats')rStats();else if(page==='admin')rAdmin();}
load();
</script>
</body>
</html>
